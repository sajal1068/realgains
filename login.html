<body>

    <div class="container d-flex justify-content-center align-items-center py-5">
        <div class="login-card">
            
            
            <div class="text-center mb-4">
                <div class="d-inline-flex p-2 bg-brandDark rounded-3 border border-secondary border-opacity-20 mb-3">
                    <img src="assets/images/logo.png" alt="Logo" class="img-fluid" style="max-height: 55px; object-contain: fit;">
                </div>
                <h2 class="h5 fw-bold text-white mb-1 uppercase tracking-wide">Member Login</h2>
                <p class="small text-secondary font-monospace" style="font-size: 11px;">[ ENTER ACCESS PROTOCOLS TO CONNECT ]</p>
            </div>

            
            <form action="#" method="post">
                <input type="hidden" name="task" value="login_member">
                <!-- Username Input Field -->
                <div class="mb-3">
                    <label class="form-label">Username*</label>
                    <div class="input-group has-left-icon">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" name="username" required="" id="username" placeholder="Enter your username" value="Oronex" required>
                    </div>
                </div>

                <!-- Password Input Field -->
                <div class="mb-3">
                    <label class="form-label">Password*</label>
                    <div class="input-group has-left-icon">
                        <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                        <input type="password" required="" id="inputChoosePassword" name="password" class="form-control border-end-0" id="passwordInput" placeholder="••••••••" value="password123" required>
                        <button class="btn btn-outline-secondary border-opacity-10 bg-dark-subtle border-start-0 px-3" type="button" onclick="togglePasswordVisibility()" style="border-radius: 0 12px 12px 0;">
                            <i id="passwordIcon" class="bi bi-eye text-secondary"></i>
                        </button>
                    </div>
                </div>

                <!-- Security Captcha Block Field -->
                <div class="mb-4">
                    <label class="form-label">Security Code*</label>
                    <div class="d-flex gap-3 align-items-center">
                        <div class="captcha-box shrink-0 shadow-sm">5173</div>
                        <input type="text" id="captcha_code" name="captcha_code" class="form-control" placeholder="Enter Captcha code" required>
                    </div>
                </div>

                <!-- Meta Auxiliary Access Links Row -->
                <div class="d-flex justify-content-between align-items-center mb-4 font-monospace">
                    <a href="forgot-login.php" class="auth-link"><i class="bi bi-question-circle me-1"></i> Forgot Login Password?</a>
                    <a href="forgot-wallet.php" class="auth-link"><i class="bi bi-wallet2 me-1"></i> Forgot Wallet Password?</a>
                </div>

                <!-- Main Authentication Action CTA Button -->
                <!-- <button type="submit" class="btn btn-login w-100 mb-4 d-flex align-items-center justify-center gap-2">
                    <i class="bi bi-box-arrow-in-right"></i> Establish Connection
                </button> -->

                <div class="mb-4 btn-login-container">
    <button type="submit" class="btn btn-login w-100 d-flex align-items-center justify-content-center gap-2">
        <i class="bi bi-cpu-fill text-dark animate-pulse" style="font-size: 14px;"></i> 
        <span class="tracking-wider">Establish Core Session</span>
    </button>
</div>

                
                <div class="text-center">
                    <p class="small text-secondary mb-0">
                        Don't have an account yet? 
                        <a href="registration.html" class="text-decoration-none fw-bold" style="color: var(--brand-gold);">Sign up here</a>
                    </p>
                </div>

            </form>

        </div>
    </div>
    
    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('passwordInput');
            const passwordIcon = document.getElementById('passwordIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                passwordIcon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
