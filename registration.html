<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Gains LLC | Registration</title>
    <link rel="icon" href="assets/images/favicon.png" type="image/png">
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/login.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

   
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center py-5">
        <div class="register-card shadow-lg">
            
            
            <div class="text-center mb-5">
                <div class="d-inline-flex p-2 bg-brandDark rounded-3 border border-secondary border-opacity-10 mb-3">
                    <img src="assets/images/logo.png" alt="Logo" class="img-fluid" style="max-height: 55px; object-fit: contain;">
                </div>
                <h2 class="h4 fw-bolder text-white mb-1 uppercase tracking-wide">Member Registration</h2>
                <p class="small text-secondary font-monospace" style="font-size: 11px;">[ DEPLOY NEW NODE PROTOCOLS TO JOIN THE MATRIX ]</p>
            </div>

            
            <form onsubmit="event.preventDefault();">
                <div class="row g-4">
                    
                    <!-- Column 1: Sponsor Username -->
                    <div class="col-md-6">
                        <label class="form-label">Sponsor Username*</label>
                        <div class="input-group has-left-icon">
                            <span class="input-group-text"><i class="bi bi-people"></i></span>
                            <input type="text" class="form-control" value="Realgains" placeholder="Enter Sponsor name" required>
                        </div>
                    </div>

                    <!-- Column 2: Personal Account Username -->
                    <div class="col-md-6">
                        <label class="form-label">Your Username*</label>
                        <div class="input-group has-left-icon">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" placeholder="Create unique username" required>
                        </div>
                    </div>

                    <!-- Column 3: Full Firstname Mapping -->
                    <div class="col-md-6">
                        <label class="form-label">Your Firstname*</label>
                        <div class="input-group has-left-icon">
                            <span class="input-group-text"><i class="bi bi-person-bounding-box"></i></span>
                            <input type="text" class="form-control" placeholder="Enter your official first name" required>
                        </div>
                    </div>

                    <!-- Column 4: Secured Email Link Address -->
                    <div class="col-md-6">
                        <label class="form-label">Your Email ID*</label>
                        <div class="input-group has-left-icon">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" placeholder="Enter registration email" required>
                        </div>
                    </div>

                    <!-- Column 5: Crypto Wallet Address Network Target -->
                    <div class="col-md-12">
                        <label class="form-label">Your Wallet Address (USDT.BEP20)*</label>
                        <div class="input-group has-left-icon">
                            <span class="input-group-text"><i class="bi bi-currency-bitcoin text-brandGreen"></i></span>
                            <input type="text" class="form-control" placeholder="0x... Enter your secure BEP20 deposit wallet sequence" required>
                        </div>
                    </div>

                    <!-- Column 6: Core System Login Password -->
                    <div class="col-md-6">
                        <label class="form-label">Your Login Password*</label>
                        <div class="input-group has-left-icon">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control border-end-0" id="loginPass" placeholder="Create complex password" required>
                            <button class="btn btn-outline-secondary border-opacity-10 bg-dark-subtle border-start-0" type="button" onclick="togglePass('loginPass', 'loginIcon')" style="border-radius: 0 12px 12px 0;">
                                <i id="loginIcon" class="bi bi-eye text-secondary"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Column 7: Secondary Operational Wallet Password -->
                    <div class="col-md-6">
                        <label class="form-label">Your Wallet Password*</label>
                        <div class="input-group has-left-icon">
                            <span class="input-group-text"><i class="bi bi-wallet2"></i></span>
                            <input type="password" class="form-control border-end-0" id="walletPass" placeholder="Create transactional password" required>
                            <button class="btn btn-outline-secondary border-opacity-10 bg-dark-subtle border-start-0" type="button" onclick="togglePass('walletPass', 'walletIcon')" style="border-radius: 0 12px 12px 0;">
                                <i id="walletIcon" class="bi bi-eye text-secondary"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Column 8: Country Selection Nodes Base -->
                    <div class="col-md-6">
                        <label class="form-label">Select Country*</label>
                        <div class="input-group has-left-icon">
                            <span class="input-group-text"><i class="bi bi-globe2"></i></span>
                            <select class="form-select" required>
                                <option value="" disabled selected>Choose registration country</option>
                                <option value="IN">India (IN Node)</option>
                                <option value="US">United States (US Node)</option>
                                <option value="AF">Afghanistan (AF Node)</option>
                            </select>
                        </div>
                    </div>

                    <!-- Column 9: Verification Security Captcha Box -->
                    <div class="col-md-6">
                        <label class="form-label">Security Code*</label>
                        <div class="d-flex gap-3 align-items-center">
                            <div class="captcha-box flex-shrink-0 shadow-sm">9776</div>
                            <input type="text" class="form-control" placeholder="Verify code" required>
                        </div>
                    </div>

                </div> <!-- End Row -->

                <!-- Main Action Execution Submission Layer -->
                <div class="mt-5 mb-4">
                    <button type="submit" class="btn btn-register w-100 d-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-check-square-fill text-dark"></i> Initialize System Register
                    </button>
                </div>

                <!-- Footer Action Redirect Link Tracking Node -->
                <div class="text-center">
                    <p class="small text-secondary mb-0">
                        Already have an account? 
                        <a href="login.html" class="text-decoration-none fw-bold" style="color: var(--brand-gold);">Login here</a>
                    </p>
                </div>

            </form>

        </div>
    </div>

    <!-- Dual Password Unmask Verification Controller Logic -->
    <script>
        function togglePass(inputId, iconId) {
            const field = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (!field || !icon) return;

            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
    </script>

    <!-- ==========================================================================
       BOOTSTRAP v5.3.1 CORE PRODUCTION BUNDLE SCRIPT CDN
       ========================================================================== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm" crossorigin="anonymous"></script>
</body>
</html>
