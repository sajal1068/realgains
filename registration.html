<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Gains LLC | Registration</title>
    <link rel="icon" href="assets/images/favicon.png" type="image/png">
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-dark: #0F1520;      /* Background Base Matrix */
            --brand-surface: #151D2A;   /* Layer Node Panel */
            --brand-gold: #E6C36A;      /* Premium Luxury Gold */
            --brand-green: #35D375;     /* System Logo Cyber Green */
            --brand-muted: #8A99AD;     /* Technical Subtitles Label */
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--brand-dark);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 5% 10%, rgba(230, 195, 106, 0.04) 0%, transparent 45%),
                radial-gradient(circle at 95% 90%, rgba(53, 211, 117, 0.04) 0%, transparent 45%);
            overflow-x: hidden;
        }

        /* Glassmorphic Node Panel Configuration */
        .register-card {
            background: rgba(21, 29, 42, 0.85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px); /* Safari support patch */
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-top: 3px solid var(--brand-green);
            border-radius: 28px;
            padding: 2.5rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 50px rgba(53, 211, 117, 0.02);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 850px;
            width: 100%;
        }

        .register-card:hover {
            border-top-color: var(--brand-gold);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.65), 0 0 50px rgba(230, 195, 106, 0.04);
        }

        /* Bootstrap v5.3.1 Input Form Elements Custom Reset */
        .form-label {
            font-size: 10px;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--brand-muted);
            margin-bottom: 0.45rem;
        }

        .input-group-text {
            background-color: rgba(15, 21, 32, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.07);
            color: var(--brand-muted);
            border-radius: 12px 0 0 12px;
        }

        .form-control, .form-select {
            background-color: rgba(15, 21, 32, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.07);
            color: #ffffff !important;
            border-radius: 12px;
            font-size: 13.5px;
            padding: 0.65rem 1rem;
            transition: all 0.2s ease;
        }

        /* Active tracking focus state built specifically for Bootstrap 5 inputs */
        .form-control:focus, .form-select:focus {
            background-color: rgba(15, 21, 32, 0.9);
            border-color: rgba(53, 211, 117, 0.4);
            box-shadow: 0 0 12px rgba(53, 211, 117, 0.08);
        }

        .form-select option {
            background-color: var(--brand-surface);
            color: white;
        }

        .has-left-icon .form-control, .has-left-icon .form-select {
            border-radius: 0 12px 12px 0;
        }

        /* Alphanumeric Captcha Box Security Layer */
        .captcha-box {
            background: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 5px;
            padding: 0.5rem 1.2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
            user-select: none;
        }

        /* ==========================================================================
           ULTRA-PREMIUM KINETIC REGISTRATION CTA BUTTON (WOW EFFECT)
           ========================================================================== */
        .btn-register {
            position: relative;
            background: linear-gradient(135deg, var(--brand-green) 0%, #10b981 50%, var(--brand-gold) 100%);
            background-size: 200% auto;
            color: #000000 !important;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            padding: 0.85rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 20px rgba(53, 211, 117, 0.25), inset 0 1px 1px rgba(255, 255, 255, 0.3);
            overflow: hidden;
        }

        .btn-register:hover {
            background-position: right center;
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 30px rgba(230, 195, 106, 0.4), 0 0 15px rgba(53, 211, 117, 0.3);
        }

        .btn-register::after {
            content: '';
            position: absolute;
            top: -50%; left: -60%; width: 30%; height: 200%;
            background: linear-gradient(to right, transparent 0%, rgba(255, 255, 255, 0.4) 50%, transparent 100%);
            transform: rotate(25deg);
        }

        .btn-register:hover::after {
            left: 140%;
            transition: left 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-register:active {
            transform: translateY(1px) scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center py-5">
        <div class="register-card shadow-lg">
            
            <!-- Branding Header Area -->
            <div class="text-center mb-5">
                <div class="d-inline-flex p-2 bg-brandDark rounded-3 border border-secondary border-opacity-10 mb-3">
                    <img src="assets/images/logo.png" alt="Logo" class="img-fluid" style="max-height: 55px; object-fit: contain;">
                </div>
                <h2 class="h4 fw-bolder text-white mb-1 uppercase tracking-wide">Member Registration</h2>
                <p class="small text-secondary font-monospace" style="font-size: 11px;">[ DEPLOY NEW NODE PROTOCOLS TO JOIN THE MATRIX ]</p>
            </div>

            <!-- Form Framework Grid System -->
            <form onsubmit="event.preventDefault();">
                <div class="row g-4">
                    
                    <!-- Column 1: Sponsor Username -->
                    <div class="col-md-6">
                        <label class="form-label">Sponsor Username*</label>
                        <div class="input-group has-left-icon">
                            <span class="input-group-text"><i class="bi bi-people"></i></span>
                            <input type="text" class="form-control" value="Realgains" placeholder="Enter Sponsor name" required>
                        </div>
                    </div>

                    <!-- Column 2: Personal Account Username -->
                    <div class="col-md-6">
                        <label class="form-label">Your Username*</label>
                        <div class="input-group has-left-icon">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" placeholder="Create unique username" required>
                        </div>
                    </div>

                    <!-- Column 3: Full Firstname Mapping -->
                    <div class="col-md-6">
                        <label class="form-label">Your Firstname*</label>
                        <div class="input-group has-left-icon">
                            <span class="input-group-text"><i class="bi bi-person-bounding-box"></i></span>
                            <input type="text" class="form-control" placeholder="Enter your official first name" required>
                        </div>
                    </div>

                    <!-- Column 4: Secured Email Link Address -->
                    <div class="col-md-6">
                        <label class="form-label">Your Email ID*</label>
                        <div class="input-group has-left-icon">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" placeholder="Enter registration email" required>
                        </div>
                    </div>

                    <!-- Column 5: Crypto Wallet Address Network Target -->
                    <div class="col-md-12">
                        <label class="form-label">Your Wallet Address (USDT.BEP20)*</label>
                        <div class="input-group has-left-icon">
                            <span class="input-group-text"><i class="bi bi-currency-bitcoin text-brandGreen"></i></span>
                            <input type="text" class="form-control" placeholder="0x... Enter your secure BEP20 deposit wallet sequence" required>
                        </div>
                    </div>

                    <!-- Column 6: Core System Login Password -->
                    <div class="col-md-6">
                        <label class="form-label">Your Login Password*</label>
                        <div class="input-group has-left-icon">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control border-end-0" id="loginPass" placeholder="Create complex password" required>
                            <button class="btn btn-outline-secondary border-opacity-10 bg-dark-subtle border-start-0" type="button" onclick="togglePass('loginPass', 'loginIcon')" style="border-radius: 0 12px 12px 0;">
                                <i id="loginIcon" class="bi bi-eye text-secondary"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Column 7: Secondary Operational Wallet Password -->
                    <div class="col-md-6">
                        <label class="form-label">Your Wallet Password*</label>
                        <div class="input-group has-left-icon">
                            <span class="input-group-text"><i class="bi bi-wallet2"></i></span>
                            <input type="password" class="form-control border-end-0" id="walletPass" placeholder="Create transactional password" required>
                            <button class="btn btn-outline-secondary border-opacity-10 bg-dark-subtle border-start-0" type="button" onclick="togglePass('walletPass', 'walletIcon')" style="border-radius: 0 12px 12px 0;">
                                <i id="walletIcon" class="bi bi-eye text-secondary"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Column 8: Country Selection Nodes Base -->
                    <div class="col-md-6">
                        <label class="form-label">Select Country*</label>
                        <div class="input-group has-left-icon">
                            <span class="input-group-text"><i class="bi bi-globe2"></i></span>
                            <select class="form-select" required>
                                <option value="" disabled selected>Choose registration country</option>
                                <option value="IN">India (IN Node)</option>
                                <option value="US">United States (US Node)</option>
                                <option value="AF">Afghanistan (AF Node)</option>
                            </select>
                        </div>
                    </div>

                    <!-- Column 9: Verification Security Captcha Box -->
                    <div class="col-md-6">
                        <label class="form-label">Security Code*</label>
                        <div class="d-flex gap-3 align-items-center">
                            <div class="captcha-box flex-shrink-0 shadow-sm">9776</div>
                            <input type="text" class="form-control" placeholder="Verify code" required>
                        </div>
                    </div>

                </div> <!-- End Row -->

                <!-- Main Action Execution Submission Layer -->
                <div class="mt-5 mb-4">
                    <button type="submit" class="btn btn-register w-100 d-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-check-square-fill text-dark"></i> Initialize System Register
                    </button>
                </div>

                <!-- Footer Action Redirect Link Tracking Node -->
                <div class="text-center">
                    <p class="small text-secondary mb-0">
                        Already have an account? 
                        <a href="login.html" class="text-decoration-none fw-bold" style="color: var(--brand-gold);">Login here</a>
                    </p>
                </div>

            </form>

        </div>
    </div>

    <!-- Dual Password Unmask Verification Controller Logic -->
    <script>
        function togglePass(inputId, iconId) {
            const field = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (!field || !icon) return;

            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
    </script>

    <!-- ==========================================================================
       BOOTSTRAP v5.3.1 CORE PRODUCTION BUNDLE SCRIPT CDN
       ========================================================================== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm" crossorigin="anonymous"></script>
</body>
</html>
