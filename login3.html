    <!-- Main Split Layout Container -->

        <div class="col-lg-6 d-none d-lg-block position-relative" 
             style="background: linear-gradient(135deg, rgba(4, 120, 87, 0.85) 0%, rgba(15, 23, 42, 0.9) 100%), 
                        url('image_30a069.jpg') center/cover no-repeat; min-height: 500px;">
            
            <!-- Branding Text Overlay inside Image Section -->
            <div class="position-absolute top-50 start-50 translate-middle text-center text-white p-4 w-100">
                <i class="bi bi-cpu-fill text-amber-400 mb-3 animate-pulse" style="font-size: 3.5rem; display: inline-block;"></i>
                <h2 class="h4 fw-bold text-uppercase tracking-wider mb-1">Oronex Core</h2>
                <p class="font-monospace text-emerald-300 small" style="font-size: 11px;">[ SECURE SESSION MAPPING ACTIVE ]</p>
            </div>
        </div>

        <!-- RIGHT COLUMN: Your Login Form with Reduced Width -->

            <div class="w-100 mx-auto" style="max-width: 400px;">
                
                <!-- Center Logo and Title Header -->
                <div class="text-center mb-4">

                    </div>

                    <p class="small text-muted font-monospace" style="font-size: 11px;">[ ENTER ACCESS PROTOCOLS TO CONNECT ]</p>
                </div>

                <!-- Original Form Fields Ke Saath -->
                <form action="#" method="post">

                    <!-- Username Input Field -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-slate-600 small">Username*</label>
                        <div class="input-group has-left-icon">

                            <input type="text" class="form-control bg-slate-50 border-slate-300" name="username" required="" id="username" placeholder="Enter your username" value="Oronex">
                        </div>
                    </div>

                    <!-- Password Input Field -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-slate-600 small">Password*</label>
                        <div class="input-group has-left-icon">
                            <span class="input-group-text bg-slate-100 text-slate-500 border-slate-300"><i class="bi bi-shield-lock"></i></span>
                            <input type="password" required="" id="inputChoosePassword" name="password" class="form-control bg-slate-50 border-slate-300 border-end-0" placeholder="••••••••" value="password123">
                            <button class="btn btn-slate-100 border border-slate-300 border-start-0 px-3" type="button" onclick="togglePasswordVisibility()" style="border-radius: 0 12px 12px 0;">

                    </div>

                    <!-- Security Captcha Block Field -->

                            <input type="text" id="captcha_code" name="captcha_code" class="form-control bg-slate-50 border-slate-300" placeholder="Enter Captcha code" required>
                        </div>
                    </div>

                    <!-- Meta Auxiliary Access Links Row -->
                    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-2 mb-4 font-monospace" style="font-size: 11px;">

                        </button>

                    <!-- Sign Up Footer Footer Link -->

                        <p class="small text-slate-500 mb-0">

</div>

<!-- Extra styles for matching exactly what you needed -->
<style>
    html, body {
        height: 100%;
        margin: 0;
        background-color: #e2e8f0;
    }
    .bg-slate-50 { background-color: #f8fafc; }
    .bg-slate-100 { background-color: #f1f5f9; }
    .border-slate-200 { border-color: #e2e8f0; }
    .border-slate-300 { border-color: #cbd5e1; }
    .text-slate-500 { color: #64748b; }
    .text-slate-600 { color: #475569; }
    .text-slate-900 { color: #0f172a; }
    .text-emerald-300 { color: #6ee7b7; }
    .text-amber-400 { color: #fbbf24; }
    
    .btn-login:hover {
        background-color: #d97706 !important; /* Golden shift on hover */
        border-color: #b45309 !important;
        box-shadow: 0 4px 12px rgba(217, 119, 6, 0.2);
    }
    .link-hover-emerald:hover {
        color: #059669 !important;
    }
</style>
    
<script>
    function togglePasswordVisibility() {
        const passwordInput = document.getElementById('inputChoosePassword');
        const passwordIcon = document.getElementById('passwordIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            passwordIcon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            passwordInput.type = 'password';
            passwordIcon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>
    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
